name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build up to image-updated (applies CoreUpdates, no JIT constraints).
      - name: Build VM + apply core updates
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile \
            --target image-updated \
            --load \
            --tag cuis-image-updated:ci \
            .

      # Run tests as a container with seccomp=unconfined.
      # The Squeak JIT requires mprotect(PROT_READ|PROT_EXEC) which Docker
      # blocks by default. seccomp=unconfined allows the syscall without
      # granting full --privileged.
      - name: Run test suite
        run: |
          docker run --rm \
            --security-opt seccomp=unconfined \
            -v "$PWD/.github/scripts":/workspace/.github/scripts \
            -v "$PWD/Packages":/workspace/Packages \
            cuis-image-updated:ci \
            bash .github/scripts/run-tests.sh
