name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build up to the 'test' stage.
      # The test stage runs the full SUnit suite as a RUN step inside Docker.
      # If any test fails the build exits non-zero and this step fails.
      # If the build completes, all tests passed.
      - name: Build → apply updates → run tests
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile \
            --target test \
            --load \
            --tag cuis-test:ci \
            .
