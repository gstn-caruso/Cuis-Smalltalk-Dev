name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build workspace image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile \
            --target workspace \
            --load \
            --tag cuis-workspace:ci \
            .

      # Apply CoreUpdates and run tests in a single container.
      # Updates modify the image file in-place; running both in one container
      # ensures tests run against the updated image.
      # seccomp=unconfined: Squeak JIT requires mprotect(PROT_READ|PROT_EXEC).
      - name: Apply core updates + run tests
        run: |
          docker run --rm \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            cuis-workspace:ci \
            bash -c "
              .github/scripts/install-updates.sh &&
              .github/scripts/run-tests.sh
            "
