name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. Build runtime image per arch, verify tests pass ───────────────────
  build-runtime:
    name: Build runtime (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image-updated stage (applies CoreUpdates to the Smalltalk image)
      - name: Build VM + apply core updates
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile \
            --target image-updated \
            --load \
            --tag cuis-image-updated:${{ matrix.arch }} \
            .

      # Run full test suite with seccomp=unconfined (required for Squeak JIT)
      - name: Run full test suite
        run: |
          docker run --rm \
            --security-opt seccomp=unconfined \
            -v "$PWD/.github/scripts":/workspace/.github/scripts \
            -v "$PWD/Packages":/workspace/Packages \
            cuis-image-updated:${{ matrix.arch }} \
            bash .github/scripts/run-tests.sh

      # Build minimal runtime image (only if tests passed above)
      - name: Build runtime image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile \
            --target runtime \
            --load \
            --tag cuis-runtime:${{ matrix.arch }} \
            .

      # Extract the updated Smalltalk image from the runtime container.
      # The VM binaries stay in CuisVM.app/ on the host for packaging.
      - name: Extract updated Smalltalk image
        run: |
          CID=$(docker create cuis-runtime:${{ matrix.arch }})
          docker cp "$CID:/workspace/CuisImage/." CuisImage/
          docker rm "$CID"
          echo "Extracted image files:"
          ls -lh CuisImage/

      - name: Package release ZIP for ${{ matrix.arch }}
        run: |
          .github/scripts/build-release.sh release-artifacts ${{ matrix.arch }}

      - name: Upload ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: release-artifacts/*.zip
          retention-days: 7

  # ── 2. Publish all ZIPs as a single GitHub Release ───────────────────────
  publish:
    name: Publish GitHub Release
    needs: build-runtime
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-amd64
          path: release-artifacts

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-arm64
          path: release-artifacts

      - name: List release files
        run: ls -lh release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cuis Smalltalk ${{ github.ref_name }}"
          body: |
            ## Cuis Smalltalk ${{ github.ref_name }}

            Ready-to-run packages. Download the ZIP for your platform, unzip, run the start script — no installation required.

            | Platform | ZIP | Run |
            |---|---|---|
            | macOS | `*-macos.zip` | `RunCuisOnMac.sh` or double-click `RunCuisOnFinder.command` |
            | Linux x86_64 | `*-linux-x86_64.zip` | `RunCuisOnLinux.sh` |
            | Linux ARM64 | `*-linux-arm64.zip` | `RunCuisOnLinux.sh` |
            | Windows x86_64 | `*-windows-x86_64.zip` | `RunCuisOnWindows.bat` |
            | Windows ARM64 | `*-windows-arm64.zip` | `RunCuisOnWindows.bat` |

            > **macOS ZIP download:** run `./unquarantine.sh` before launching.

            ### What's inside each ZIP
            - Updated Smalltalk image (all core changesets applied, tests verified)
            - VM binary for the target platform
            - TrueType fonts
            - Start script

            ### What's NOT included
            - `CoreUpdates/` — already applied to the image
            - `Packages/` — load optional packages from inside Cuis
            - `Documentation/` — see the [repository](https://github.com/${{ github.repository }})
          files: release-artifacts/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
