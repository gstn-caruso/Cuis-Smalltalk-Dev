name: Release

on:
  push:
    branches: [main]

# Versión del VM de OpenSmalltalk que se baja para construir y empaquetar.
# Es la misma build que veníamos shippeando vendoreada (el dir de plugins era
# 7.0-202603271636-64bit). El VM ya no vive en el repo: se baja del release
# oficial de OpenSmalltalk. Bumpear esta versión es un cambio aparte.
env:
  VM_RELEASE: "202603271636"
  VM_BASE_URL: "https://github.com/OpenSmalltalk/opensmalltalk-vm/releases/download"

jobs:
  # ---------------------------------------------------------------------------
  # 1) Construir la imagen UNA sola vez.
  #    La imagen es platform-neutral: el mismo .image sirve para macOS y Linux.
  #    Se construye con el VM Linux x86_64 (bajado de OpenSmalltalk) en modo
  #    headless (-vm-display-null): en headless el VM no stepea la UI, así el
  #    script -s corre sincrónico y no se dispara ningún diálogo modal de arranque.
  # ---------------------------------------------------------------------------
  build-image:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          VERSION=$(ls CoreUpdates/*.cs.st | sed 's|CoreUpdates/||; s|-.*||' | sort -n | tail -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Download VM (Linux x64)
        run: |
          curl -fsSL -o /tmp/vm.tar.gz \
            "${VM_BASE_URL}/${VM_RELEASE}/squeak.cog.spur_linux64x64.tar.gz"
          mkdir -p /tmp/vm && tar xzf /tmp/vm.tar.gz -C /tmp/vm
          VM=$(find /tmp/vm -maxdepth 2 -type f -name squeak | head -1)
          chmod +x "$VM"
          echo "VM=${VM}" >> "$GITHUB_ENV"

      - name: Build image (headless, applies CoreUpdates)
        run: |
          VERSION=${{ steps.version.outputs.version }}

          SRC=$(ls CuisImage | grep -E 'Cuis7\.7-[0-9]+\.image')
          # Renombramos a la versión final ANTES de construir, para que el
          # basename quede consistente (Cuis deriva el .changes del nombre del
          # .image; renombrar después confunde el chequeo de "changes not clean").
          cp "CuisImage/${SRC}" "CuisImage/Cuis7.7-${VERSION}.image"
          cp "CuisImage/${SRC%.image}.changes" "CuisImage/Cuis7.7-${VERSION}.changes"

          cat > /tmp/build.st <<'SMALLTALK'
          Utilities classPool at: #AuthorName put: 'Github CI'.
          Utilities classPool at: #AuthorInitials put: 'CI'.

          "Aplicamos los updates nuevos sin pasar por installNewUpdates,
           que termina con un 'inform:' modal cuando hay paquetes desactualizados.
           saveAndQuit deja el .changes limpio (snapshot al final, en
           LastQuitLogPosition), así la imagen del release abre sin warnings."
          ChangeSet newUpdates: DirectoryEntry coreUpdatesDirectory do: [ :each |
              ChangeSet install: each ].

          Smalltalk saveAndQuit.
          SMALLTALK

          "$VM" -vm-display-null -vm-sound-null \
            "CuisImage/Cuis7.7-${VERSION}.image" -s /tmp/build.st

      - name: Debug log on failure
        if: failure()
        run: find . /tmp -name 'CuisDebug-*.log' 2>/dev/null -exec sh -c 'echo "=== {} ==="; cat "{}"' \;

      - name: Upload built image
        uses: actions/upload-artifact@v7
        with:
          name: built-image
          path: |
            CuisImage/Cuis7.7-${{ steps.version.outputs.version }}.image
            CuisImage/Cuis7.7-${{ steps.version.outputs.version }}.changes
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 1b) Correr la suite completa sobre la imagen ya construida.
  #     Baja el VM Linux x64, instala BaseImageTests.pck.st y corre TODOS los
  #     TestCase no abstractos. Sale con código 1 si hay failures o errors, lo
  #     que bloquea package y release aguas abajo.
  # ---------------------------------------------------------------------------
  test:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download built image
        uses: actions/download-artifact@v8
        with:
          name: built-image
          path: built

      - name: Download VM (Linux x64)
        run: |
          curl -fsSL -o /tmp/vm.tar.gz \
            "${VM_BASE_URL}/${VM_RELEASE}/squeak.cog.spur_linux64x64.tar.gz"
          mkdir -p /tmp/vm && tar xzf /tmp/vm.tar.gz -C /tmp/vm
          VM=$(find /tmp/vm -maxdepth 2 -type f -name squeak | head -1)
          chmod +x "$VM"
          echo "VM=${VM}" >> "$GITHUB_ENV"

      - name: Run tests (headless)
        run: |
          VERSION=${{ needs.build-image.outputs.version }}

          cp "built/Cuis7.7-${VERSION}.image"   /tmp/test.image
          cp "built/Cuis7.7-${VERSION}.changes" /tmp/test.changes
          cp CuisImage/Cuis7.6.sources CuisImage/UnicodeData.txt /tmp/

          cat > /tmp/runTests.st <<'SMALLTALK'
          | testSuite result exitCode |
          Utilities classPool at: #AuthorName put: 'Github CI'.
          Utilities classPool at: #AuthorInitials put: 'CI'.

          CodePackageFile installPackage: DirectoryEntry currentDirectory // 'Packages/BaseImageTests.pck.st'.
          ChangeSet fileIn: DirectoryEntry currentDirectory // '.github/scripts/TestResultConsolePrinter.st'.

          testSuite := TestSuite new.
          (TestCase allSubclasses reject: [:tc | tc isAbstract])
              do: [:tc | tc addToSuiteFromSelectors: testSuite].

          result := testSuite run.
          result printReport.

          exitCode := (result hasFailures or: [result hasErrors]) ifTrue: [1] ifFalse: [0].
          Smalltalk quitPrimitive: exitCode.
          SMALLTALK

          "$VM" -vm-display-null -vm-sound-null \
            /tmp/test.image -s /tmp/runTests.st

      - name: Debug log on failure
        if: failure()
        run: find . /tmp -name 'CuisDebug-*.log' 2>/dev/null -exec sh -c 'echo "=== {} ==="; cat "{}"' \;

  # ---------------------------------------------------------------------------
  # 2) Empaquetar por plataforma. Cada bundle baja el VM oficial de OpenSmalltalk
  #    de su plataforma y lo acomoda en el layout CuisVM.app/Contents/<target>/
  #    que esperan los launchers. Corre en ubuntu (el .dmg de macOS se extrae
  #    con 7z, sin montar).
  # ---------------------------------------------------------------------------
  package:
    needs: [build-image, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: macOS
            vm_asset: "squeak.cog.spur_macos64ARMv8.dmg"
            launchers: "RunQSmalltalkOnMac.sh RunQSmalltalkOnFinder.command"
          - target: Linux-x86_64
            vm_asset: "squeak.cog.spur_linux64x64.tar.gz"
            launchers: "RunQSmalltalkOnLinux.sh"
          - target: Linux-arm64
            vm_asset: "squeak.cog.spur_linux64ARMv8.tar.gz"
            launchers: "RunQSmalltalkOnLinux.sh"
    steps:
      - uses: actions/checkout@v6

      - name: Download built image
        uses: actions/download-artifact@v8
        with:
          name: built-image
          path: built

      - name: Install p7zip (for .dmg extraction)
        if: matrix.target == 'macOS'
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Download VM (${{ matrix.target }})
        run: |
          curl -fsSL -o "/tmp/${{ matrix.vm_asset }}" \
            "${VM_BASE_URL}/${VM_RELEASE}/${{ matrix.vm_asset }}"

      - name: Assemble bundle
        run: |
          VERSION=${{ needs.build-image.outputs.version }}
          TARGET=${{ matrix.target }}
          ASSET=${{ matrix.vm_asset }}
          BUNDLE="qSmalltalk-${VERSION}-${TARGET}"

          mkdir -p "${BUNDLE}/CuisImage" "${BUNDLE}/CuisVM.app/Contents"

          cp "built/Cuis7.7-${VERSION}.image"   "${BUNDLE}/CuisImage/"
          cp "built/Cuis7.7-${VERSION}.changes" "${BUNDLE}/CuisImage/"
          cp CuisImage/Cuis7.6.sources CuisImage/UnicodeData.txt "${BUNDLE}/CuisImage/"

          case "$TARGET" in
            macOS)
              # El .dmg trae Squeak.app/Contents/{MacOS,Resources,Info.plist}.
              7z x "/tmp/${ASSET}" -o/tmp/macvm >/dev/null
              APP=$(find /tmp/macvm -maxdepth 3 -type d -name 'Squeak.app' | head -1)
              cp -a "${APP}/Contents/MacOS"     "${BUNDLE}/CuisVM.app/Contents/"
              cp -a "${APP}/Contents/Resources" "${BUNDLE}/CuisVM.app/Contents/"
              cp -a "${APP}/Contents/Info.plist" "${BUNDLE}/CuisVM.app/Contents/"
              ;;
            Linux-*)
              # El .tar.gz trae un único dir top con squeak + bin/ + lib/.
              mkdir -p /tmp/linvm && tar xzf "/tmp/${ASSET}" -C /tmp/linvm
              TOP=$(find /tmp/linvm -maxdepth 1 -mindepth 1 -type d | head -1)
              mkdir -p "${BUNDLE}/CuisVM.app/Contents/${TARGET}"
              cp -a "${TOP}/." "${BUNDLE}/CuisVM.app/Contents/${TARGET}/"
              ;;
          esac

          cp -r TrueTypeFonts "${BUNDLE}/"
          for l in ${{ matrix.launchers }}; do cp ".github/scripts/$l" "${BUNDLE}/"; done
          chmod +x "${BUNDLE}"/RunQSmalltalkOn* 2>/dev/null || true

          zip -ry "${BUNDLE}.zip" "${BUNDLE}/"
          ls -la "${BUNDLE}.zip"

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.target }}
          path: qSmalltalk-*-${{ matrix.target }}.zip
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 2b) Firmar ad-hoc el bundle de macOS (sin notarización, sin secrets).
  #     El job package corre en Linux y no puede firmar el .app; acá, en un
  #     runner macOS, le ponemos una firma ad-hoc real a todo el .app. NO
  #     notariza: el usuario igual tiene que sacar la cuarentena la primera vez
  #     (ver release notes), pero ya no aparece el error -47 en Apple Silicon.
  # ---------------------------------------------------------------------------
  sign-macos:
    needs: [build-image, package]
    runs-on: macos-latest
    steps:
      - name: Download macOS bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-macOS
          path: dist

      - name: Ad-hoc sign CuisVM.app
        run: |
          VERSION=${{ needs.build-image.outputs.version }}
          BUNDLE="qSmalltalk-${VERSION}-macOS"
          unzip -q "dist/${BUNDLE}.zip"

          codesign --force --deep --sign - "${BUNDLE}/CuisVM.app"
          codesign --verify --verbose "${BUNDLE}/CuisVM.app"

          # Re-empaquetar con la .app ya firmada, misma estructura que package.
          rm -f "${BUNDLE}.zip"
          zip -ry "${BUNDLE}.zip" "${BUNDLE}/"

      - name: Re-upload signed macOS bundle
        uses: actions/upload-artifact@v7
        with:
          name: bundle-macOS
          path: qSmalltalk-*-macOS.zip
          overwrite: true
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3) Publicar el release con los 3 zips.
  # ---------------------------------------------------------------------------
  release:
    needs: [build-image, package, sign-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v8
        with:
          pattern: bundle-*
          path: dist
          merge-multiple: true

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ needs.build-image.outputs.version }}
          gh release delete "v${VERSION}" --yes --cleanup-tag \
            --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ needs.build-image.outputs.version }}"
          name: "qSmalltalk #${{ needs.build-image.outputs.version }}"
          files: dist/*.zip
          body: |
            **qSmalltalk** — a Smalltalk that diverges from Cuis on purpose.

            | | Versión |
            |---|---|
            | Imagen (Cuis 7.7, update aplicado) | `#${{ needs.build-image.outputs.version }}` |
            | VM (OpenSmalltalk) | `${{ env.VM_RELEASE }}` |

            | Plataforma | Archivo | Arranque |
            |------------|---------|----------|
            | macOS (Apple Silicon) | `qSmalltalk-${{ needs.build-image.outputs.version }}-macOS.zip` | `./RunQSmalltalkOnMac.sh` |
            | Linux x86_64 | `qSmalltalk-${{ needs.build-image.outputs.version }}-Linux-x86_64.zip` | `./RunQSmalltalkOnLinux.sh` |
            | Linux arm64 | `qSmalltalk-${{ needs.build-image.outputs.version }}-Linux-arm64.zip` | `./RunQSmalltalkOnLinux.sh` |

            **macOS — primera vez:** si bajaste el zip por el navegador, macOS lo pone
            en cuarentena y Gatekeeper bloquea la VM (no está notarizada). Sacale la
            cuarentena una vez tras descomprimir:

            ```bash
            xattr -dr com.apple.quarantine qSmalltalk-${{ needs.build-image.outputs.version }}-macOS
            ```
